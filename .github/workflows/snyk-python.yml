name: Snyk Python SAST

on:
  push:
    branches: [Staging-Environment]
  pull_request:
    branches: [Staging-Environment]

jobs:
  snyk-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Debug token
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "Token is EMPTY"
          else
            echo "Token is present"
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk test (detailed)
        run: snyk test --severity-threshold=low --all-projects --org=43042c0a-7aa8-457c-8288-e1179819e2d6
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Monitor
        run: snyk monitor --org=43042c0a-7aa8-457c-8288-e1179819e2d6
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
