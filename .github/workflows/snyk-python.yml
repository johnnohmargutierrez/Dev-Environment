name: Snyk Python SAST

on:
  push:
    branches: [Staging-Environment]
  pull_request:
    branches: [Staging-Environment]

jobs:
  snyk-security:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Install Snyk CLI (for additional CLI commands if needed)
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 5️⃣ Authenticate Snyk
      - name: Authenticate Snyk
        run: snyk auth $SNYK_TOKEN
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 6️⃣ Run Snyk test (detect SAST + dependency vulnerabilities)
      - name: Run Snyk SAST Test
        uses: snyk/actions/python@master
        with:
          args: test --severity-threshold=high --json > snyk-report.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 7️⃣ Monitor project in Snyk for continuous tracking
      - name: Snyk Monitor
        run: snyk monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
