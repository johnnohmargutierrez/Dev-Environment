name: Snyk Python SAST

on:
  push:
    branches: [Staging-Environment]
  pull_request:
    branches: [Staging-Environment]

jobs:
  snyk-security:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Cache Python dependencies for speed
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 3️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5️⃣ Run Snyk SAST scan (no need to install CLI separately)
      - name: Run Snyk SAST Test
        uses: snyk/actions/python@master
        with:
          args: test --severity-threshold=high --json > snyk-report.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 6️⃣ Monitor project in Snyk
      - name: Snyk Monitor
        uses: snyk/actions/python@master
        with:
          args: monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
