name: Snyk Python SAST (cross-platform)

on:
  push:
    branches: [Staging-Environment]
  pull_request:
    branches: [Staging-Environment]

jobs:
  snyk-security:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Create and activate a virtual environment
      - name: Set up virtual environment and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Install Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 5️⃣ Run Snyk test (skip monitor to avoid 403)
      - name: Run Snyk test
        run: |
          source venv/bin/activate
          snyk test --severity-threshold=low --all-projects --skip-monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Optional monitor (uncomment if org supports it)
      # - name: Snyk Monitor
      #   run: |
      #     source venv/bin/activate
      #     snyk monitor
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
