name: Snyk Python SAST

on:
  push:
    branches: [Staging-Environment]
  pull_request:
    branches: [Staging-Environment]

jobs:
  snyk-security:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Install Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 5️⃣ Run Snyk test only (skip monitor to avoid 403)
      - name: Run Snyk test
        run: snyk test --severity-threshold=low --all-projects --skip-monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Optional: you can monitor only if your token/org has proper permissions
      # - name: Snyk Monitor
      #   run: snyk monitor
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
